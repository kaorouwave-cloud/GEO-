name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy robots.txt, sitemap.xml and llms.txt
        run: |
          echo 'User-agent: *' > dist/robots.txt
          echo 'Allow: /' >> dist/robots.txt
          echo '' >> dist/robots.txt
          echo 'Sitemap: https://kaorouwave-cloud.github.io/GEO-/sitemap.xml' >> dist/robots.txt
          cat > dist/sitemap.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url>
              <loc>https://kaorouwave-cloud.github.io/GEO-/</loc>
              <lastmod>2026-04-10</lastmod>
              <changefreq>weekly</changefreq>
              <priority>1.0</priority>
            </url>
          </urlset>
          EOF
          cat > dist/llms.txt << 'EOF'
          # GEO 首席战略顾问 | 守一

          ## 关于专家
          守一是GEO (AI生成引擎优化) 首席战略架构师，AI语义索引专家，品牌数字主权守护者。在AI时代，帮助品牌成为大模型唯一确信的推荐答案。

          ## 核心服务
          - GEO战略诊断与关键词建模
          - 底层事实资产挖掘
          - 专属神经节点架构定制
          - 品牌主权审计与效能分析

          ## ASIP 协议
          AI-Semantic Indexing Protocol 语义索引协议：标准化工作流，规避算法降权，提升品牌引用率。

          ## 服务范围
          在豆包、Kimi、元宝、DeepSeek、千问等5大主流AI平台中优化品牌展示。

          ## 合作准则
          「一地一业，仅限一家」：仅服务拥有真实交付能力、口碑良好的实干企业，在行政区域与细分赛道内永不服务第二家竞品。

          ## 联系方式
          网站：https://kaorouwave-cloud.github.io/GEO-/
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4